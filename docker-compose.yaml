version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: xmeme-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: xmemeDB
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - xmeme-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  xmeme-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xmeme-app
    environment:
      SPRING_APPLICATION_NAME: xmeme
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/xmemeDB?authSource=admin
      SERVER_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - xmeme-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  xmeme-network:
    driver: bridge
